import java.util.Properties   // 👈 就加这一句

plugins {
    id "com.android.application"
    id "org.jetbrains.kotlin.android"   // ✅ 新写法，替代 kotlin-android
    id "dev.flutter.flutter-gradle-plugin"
}

def localProperties = new Properties()
def localPropertiesFile = rootProject.file('local.properties')
if (localPropertiesFile.exists()) {
    localPropertiesFile.withReader('UTF-8') { reader ->
        localProperties.load(reader)
    }
}

// Load keystore properties for release signing (if present)
def keystoreProperties = new Properties()
def keystorePropertiesFile = rootProject.file('key.properties')
if (keystorePropertiesFile.exists()) {
    keystorePropertiesFile.withReader('UTF-8') { reader ->
        keystoreProperties.load(reader)
    }
}

def flutterVersionCode = localProperties.getProperty('flutter.versionCode')
if (flutterVersionCode == null) {
    flutterVersionCode = '1'
}

def flutterVersionName = localProperties.getProperty('flutter.versionName')
if (flutterVersionName == null) {
    flutterVersionName = '1.0'
}

android {
    namespace "com.datou.smart_display_mobile"
    compileSdkVersion flutter.compileSdkVersion
    ndkVersion "26.1.10909125"


    // ✅ app 模块统一到 Java 11
    compileOptions {
        sourceCompatibility JavaVersion.VERSION_11
        targetCompatibility JavaVersion.VERSION_11
    }

    // ✅ app 模块的 Kotlin 也编译成 JVM 11
    kotlinOptions {
        jvmTarget = '11'
        // 这两行可加可不加，如果你想写上也可以：
        // languageVersion = '1.9'
        // apiVersion = '1.9'
    }

    sourceSets {
        main.java.srcDirs += 'src/main/kotlin'
    }

    defaultConfig {
        // TODO: Specify your own unique Application ID (https://developer.android.com/studio/build/application-id.html).
        applicationId "com.datou.smart_display_mobile"
        // You can update the following values to match your application needs.
        // For more information, see: https://docs.flutter.dev/deployment/android#reviewing-the-gradle-build-configuration.
        minSdkVersion flutter.minSdkVersion
        targetSdkVersion flutter.targetSdkVersion
        versionCode flutterVersionCode.toInteger()
        versionName flutterVersionName
        ndk {
            abiFilters "armeabi-v7a", "arm64-v8a"
        }
    }

    signingConfigs {
        release {
            if (keystoreProperties.containsKey('storeFile')) {
                storeFile file(keystoreProperties['storeFile'])
            }
            if (keystoreProperties.containsKey('storePassword')) {
                storePassword keystoreProperties['storePassword']
            }
            if (keystoreProperties.containsKey('keyAlias')) {
                keyAlias keystoreProperties['keyAlias']
            }
            if (keystoreProperties.containsKey('keyPassword')) {
                keyPassword keystoreProperties['keyPassword']
            }
        }
    }

    buildTypes {
        release {
            // 用 release keystore，如果没有就用 debug
            signingConfig keystorePropertiesFile.exists() ? signingConfigs.release : signingConfigs.debug

            // 你可以先关掉混淆，先打包成功再说：
            // minifyEnabled false
            // shrinkResources false

            // 如果你本来就开混淆，用这个：
            minifyEnabled true
            shrinkResources true

            // 告诉 R8：用默认 proguard 规则 + 你自己的 proguard-rules.pro
            proguardFiles getDefaultProguardFile('proguard-android-optimize.txt'),
                    'proguard-rules.pro'
        }
    }

    // Ensure our custom Application class is used
    defaultConfig.manifestPlaceholders += [
            applicationName: "com.datou.smart_display_mobile.MainApplication"
    ]
}

flutter {
    source '../..'
}

dependencies {
    // Needed for RxJavaPlugins global error handler used in MainApplication
    implementation 'io.reactivex.rxjava2:rxjava:2.2.21'


    // 🔒 强制使用一个和 AGP 8.6.0 兼容的 androidx.core 版本
    implementation "androidx.core:core-ktx:1.13.1"
    implementation "androidx.core:core:1.13.1"

    // 1. errorprone 注解
    implementation "com.google.errorprone:error_prone_annotations:2.26.1"

    // 2. javax.annotation（@Nullable 等）
    implementation "javax.annotation:javax.annotation-api:1.3.2"

    // 3. 并发注解（@GuardedBy 等）
    implementation "com.google.code.findbugs:jsr305:3.0.2"
}
