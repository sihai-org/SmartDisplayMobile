  <title>Privacy Policy - VznGPT</title>
  <style>
    :root {
      --text: #1f2328;
      --muted: #6b7280;
      --line: #e5e7eb;
      --bg: #ffffff;
      --bg-soft: #f8fafc;
      --accent: #2563eb;
      --max-width: 820px;
    }

    * {
      box-sizing: border-box;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      margin: 0;
      background: var(--bg);
      color: var(--text);
      font: 16px/1.75 -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "PingFang SC", "Microsoft YaHei", Arial, sans-serif;
    }

    a {
      color: var(--accent);
      text-decoration: none;
    }

    a:hover {
      text-decoration: underline;
    }

    .topbar {
      position: sticky;
      top: 0;
      z-index: 20;
      background: rgba(255, 255, 255, 0.92);
      backdrop-filter: blur(10px);
      border-bottom: 1px solid var(--line);
    }

    .topbar-inner {
      width: min(100% - 32px, var(--max-width));
      margin: 0 auto;
      min-height: 64px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
    }

    .brand {
      font-size: 16px;
      font-weight: 600;
      color: var(--text);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .lang-switch {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      padding: 4px;
      border: 1px solid var(--line);
      border-radius: 999px;
      background: var(--bg);
      flex-shrink: 0;
    }

    .lang-btn {
      border: 0;
      background: transparent;
      color: var(--muted);
      font-size: 14px;
      font-weight: 600;
      padding: 8px 12px;
      border-radius: 999px;
      cursor: pointer;
      transition: 0.2s ease;
    }

    .lang-btn.active {
      background: var(--bg-soft);
      color: var(--text);
    }

    .container {
      width: min(100% - 32px, var(--max-width));
      margin: 0 auto;
      padding: 32px 0 56px;
    }

    h1 {
      margin: 0 0 8px;
      font-size: 32px;
      line-height: 1.2;
      letter-spacing: -0.02em;
    }

    .subtitle {
      margin: 0 0 8px;
      color: var(--muted);
      font-size: 15px;
    }

    .updated {
      margin: 0 0 28px;
      color: var(--muted);
      font-size: 14px;
    }

    .section {
      padding: 22px 0;
      border-top: 1px solid var(--line);
    }

    .section:first-of-type {
      border-top: 0;
      padding-top: 0;
    }

    h2 {
      margin: 0 0 12px;
      font-size: 20px;
      line-height: 1.35;
      letter-spacing: -0.01em;
    }

    p {
      margin: 0;
    }

    p + p {
      margin-top: 12px;
    }

    ul {
      margin: 0;
      padding-left: 20px;
    }

    li + li {
      margin-top: 8px;
    }

    .company-block {
      white-space: pre-line;
      color: var(--text);
    }

    .footer {
      margin-top: 32px;
      padding-top: 20px;
      border-top: 1px solid var(--line);
      color: var(--muted);
      font-size: 14px;
    }

    @media (max-width: 640px) {
      .topbar-inner,
      .container {
        width: min(100% - 24px, var(--max-width));
      }

      h1 {
        font-size: 28px;
      }

      h2 {
        font-size: 18px;
      }

      .lang-btn {
        padding: 7px 10px;
      }
    }
  </style>
</head>

    }
  };

  let currentLang = "en";

  function renderList(id, items) {
    const el = document.getElementById(id);
    el.innerHTML = "";
    items.forEach(item => {
      const li = document.createElement("li");
      li.textContent = item;
      el.appendChild(li);
    });
  }

  function applyLanguage(lang) {
    currentLang = lang;
    document.documentElement.lang = lang;

    const t = messages[lang];
    document.title = `${t.pageTitle} - VznGPT`;

    document.querySelectorAll("[data-i18n]").forEach(node => {
      const key = node.dataset.i18n;
      node.textContent = t[key];
    });

    document.getElementById("companyInfo").innerHTML = t.companyInfo.join("<br>");
    document.getElementById("contactText").textContent = t.contactText;

    renderList("section1List", t.section1List);
    renderList("section2List", t.section2List);
    renderList("section4List", t.section4List);
    renderList("section5List", t.section5List);
    renderList("section6List", t.section6List);
    renderList("section10List", t.section10List);
    renderList("section11List", t.section11List);

    document.querySelectorAll(".lang-btn").forEach(btn => {
      btn.classList.toggle("active", btn.dataset.lang === lang);
    });
  }

  document.querySelectorAll(".lang-btn").forEach(btn => {
    btn.addEventListener("click", () => applyLanguage(btn.dataset.lang));
  });

  applyLanguage("en");
</script>
</body>

</html>
